name: Agent cross-series reader integration

on:
  push:
    branches:
      - agent/cross-series-reader-navigation

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
