    private fun moveReadingList(
        session: ReadingListReaderDestination,
        direction: ReadingListReaderDirection,
    ) {
        lifecycleScope.launch {
            setProgressDialog(true)
            val result = try {
                withIOContext {
                    readingListNavigator.move(session.readingListId, session.entryId, direction)
                }
            } finally {
                setProgressDialog(false)
            }
            handleReadingListResult(result)
        }
    }

    private fun skipReadingListEntry(entry: ReadingListReaderBlockedEntry) {
        readingListBlockedEntry.value = null
        lifecycleScope.launch {
            setProgressDialog(true)
            val result = try {
                withIOContext {
                    readingListNavigator.skip(entry.readingListId, entry.entryId)
                }
            } finally {
                setProgressDialog(false)
            }
            handleReadingListResult(result)
        }
    }

    private fun handleReadingListResult(result: ReadingListReaderResult) {
        when (result) {
            is ReadingListReaderResult.Ready -> {
                startActivity(newReadingListIntent(this, result.destination))
                finish()
            }
            is ReadingListReaderResult.Blocked -> readingListBlockedEntry.value = result.entry
            is ReadingListReaderResult.Completed -> {
                toast(
                    getString(
                        R.string.reading_list_reader_completed,
                        result.readingListName ?: getString(R.string.reading_list_untitled),
                    ),
                )
                finish()
            }
            is ReadingListReaderResult.Boundary -> Unit
            is ReadingListReaderResult.MissingReadingList,
            is ReadingListReaderResult.MissingEntry,
            is ReadingListReaderResult.MissingEntryAtPosition,
            -> toast(R.string.reading_list_reader_failed)
        }
    }

    private fun reviewReadingList(readingListId: Long) {
        readingListBlockedEntry.value = null
        startActivity(
            Intent(this, MainActivity::class.java).apply {
                action = Constants.SHORTCUT_READING_LIST
                putExtra(Constants.READING_LIST_EXTRA, readingListId)
                addFlags(Intent.FLAG_ACTIVITY_CLEAR_TOP)
            },
        )
        finish()
    }

    private fun Intent.toReadingListDestination(): ReadingListReaderDestination? {
        val readingListId = getLongExtra(EXTRA_READING_LIST_ID, -1L)
        val entryId = getLongExtra(EXTRA_READING_LIST_ENTRY_ID, -1L)
        val position = getIntExtra(EXTRA_READING_LIST_POSITION, -1)
        val entryCount = getIntExtra(EXTRA_READING_LIST_ENTRY_COUNT, -1)
        val mangaId = getLongExtra("manga", -1L)
        val chapterId = getLongExtra("chapter", -1L)
        val series = getStringExtra(EXTRA_READING_LIST_SERIES)
        val issueNumber = getStringExtra(EXTRA_READING_LIST_ISSUE)
        if (
            readingListId < 0L || entryId < 0L || position < 0 || entryCount <= 0 ||
            mangaId < 0L || chapterId < 0L || series == null || issueNumber == null
        ) {
            return null
        }
        return ReadingListReaderDestination(
            readingListId = readingListId,
            readingListName = getStringExtra(EXTRA_READING_LIST_NAME),
            entryId = entryId,
            position = position,
            entryCount = entryCount,
            series = series,
            issueNumber = issueNumber,
            mangaId = mangaId,
            chapterId = chapterId,
            hasPrevious = getBooleanExtra(EXTRA_READING_LIST_HAS_PREVIOUS, false),
            hasNext = getBooleanExtra(EXTRA_READING_LIST_HAS_NEXT, false),
        )
    }

    private fun ReadingListReaderDestination.toBlocked(
        reason: ReadingListReaderBlockReason,
    ): ReadingListReaderBlockedEntry {
        return ReadingListReaderBlockedEntry(
            readingListId = readingListId,
            readingListName = readingListName,
            entryId = entryId,
            position = position,
            entryCount = entryCount,
            series = series,
            issueNumber = issueNumber,
            reason = reason,
        )
    }
