name: Agent run parenthetical series year

on:
  push:
    branches:
      - agent/manual-review-ui

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/manual-review-ui
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Apply correction and validate
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/agent-parenthetical-series-year.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          end_marker = "\n          PY\n\n          ./gradlew spotlessApply"
          embedded = workflow.split(marker, 1)[1].split(end_marker, 1)[0]
          script = textwrap.dedent(embedded)
          exec(compile(script, 'parenthetical-series-year-patch', 'exec'))
          PY

          ./gradlew spotlessApply
          ./gradlew :domain:testDebugUnitTest --tests tachiyomi.domain.readinglist.matching.ReadingListMatchScorerTest
          ./gradlew :app:testDebugUnitTest --tests eu.kanade.tachiyomi.ui.readinglist.ReadingListCandidateSearchTest
          git diff --check

      - name: Commit correction
        shell: bash
        run: |
          rm .github/workflows/agent-parenthetical-series-year.yml
          rm .github/workflows/agent-run-parenthetical-series-year.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use parenthetical years as series evidence"
          git push origin HEAD:agent/manual-review-ui
