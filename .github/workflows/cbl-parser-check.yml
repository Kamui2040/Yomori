name: CBL Parser Check

on:
  pull_request:
    paths:
      - 'domain/src/main/java/tachiyomi/domain/readinglist/cbl/**'
      - 'domain/src/test/java/tachiyomi/domain/readinglist/cbl/**'
      - '.github/workflows/cbl-parser-check.yml'

permissions:
  contents: read

jobs:
  parser-test:
    name: Test CBL parser
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run focused parser tests
        run: ./gradlew :domain:testDebugUnitTest --console=plain --stacktrace
