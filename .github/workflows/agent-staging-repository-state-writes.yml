name: Agent staging repository state writes

on:
  push:
    branches:
      - agent/cross-series-reader-navigation-staging

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/cross-series-reader-navigation-staging
          fetch-depth: 0
      - shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          path = Path("data/src/main/java/tachiyomi/data/readinglist/ReadingListRepositoryImpl.kt")
          text = path.read_text(encoding="utf-8")
          anchor = '''    override suspend fun delete(id: Long) {
        database.reading_listsQueries.deleteReadingList(id)
    }
'''
          insertion = '''    override suspend fun setEntrySkipped(
        readingListId: Long,
        entryId: Long,
        skipped: Boolean,
    ): Boolean {
        return database.transactionWithResult {
            val guard = database.reading_listsQueries.getEntryResolutionGuard(entryId).awaitAsOneOrNull()
                ?: return@transactionWithResult false
            if (guard.readingListId != readingListId) return@transactionWithResult false

            database.zz_reading_list_progressQueries.setReadingListEntrySkipped(
                skipped = skipped,
                entryId = entryId,
            )
            database.reading_listsQueries.touchReadingList(
                updatedAt = currentTimeMillis(),
                id = readingListId,
            )
            true
        }
    }

    override suspend fun markEntryReaderFailure(
        entryId: Long,
        state: ReadingListEntryResolutionState,
    ): Boolean {
        require(
            state == ReadingListEntryResolutionState.SOURCE_UNAVAILABLE ||
                state == ReadingListEntryResolutionState.CHAPTER_REMOVED ||
                state == ReadingListEntryResolutionState.NEEDS_REMATCH,
        ) {
            "Reader failures may only use a repairable resolution state"
        }

        return database.transactionWithResult {
            val guard = database.reading_listsQueries.getEntryResolutionGuard(entryId).awaitAsOneOrNull()
                ?: return@transactionWithResult false
            database.zz_reading_list_progressQueries.markReadingListEntryReaderFailure(
                resolutionState = state.name,
                entryId = entryId,
            )
            database.reading_listsQueries.touchReadingList(
                updatedAt = currentTimeMillis(),
                id = guard.readingListId,
            )
            true
        }
    }

    override suspend fun clearEntryReaderFailure(entryId: Long): Boolean {
        return database.transactionWithResult {
            val guard = database.reading_listsQueries.getEntryResolutionGuard(entryId).awaitAsOneOrNull()
                ?: return@transactionWithResult false
            database.zz_reading_list_progressQueries.clearReadingListEntryReaderFailure(entryId)
            database.reading_listsQueries.touchReadingList(
                updatedAt = currentTimeMillis(),
                id = guard.readingListId,
            )
            true
        }
    }

    override suspend fun delete(id: Long) {
        database.reading_listsQueries.deleteReadingList(id)
    }
'''
          if text.count(anchor) != 1:
              raise RuntimeError(f"Repository insertion anchor count: {text.count(anchor)}")
          path.write_text(text.replace(anchor, insertion), encoding="utf-8")
          PY
          status=$?
          if [ "$status" -ne 0 ]; then git reset --hard HEAD; fi
          rm -f .github/workflows/agent-staging-repository-state-writes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          if [ "$status" -eq 0 ]; then git commit -m "Persist reader entry states through repository"; else git commit -m "Remove unsuccessful repository state helper"; fi
          git push origin HEAD:agent/cross-series-reader-navigation-staging
          exit 0
