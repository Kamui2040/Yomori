name: Agent staging validation

on:
  push:
    branches:
      - agent/cross-series-reader-navigation-staging

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/cross-series-reader-navigation-staging
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Run validation and record real outcomes
        shell: bash
        run: |
          set +e
          report="$RUNNER_TEMP/staging-validation.md"
          : > "$report"
          printf '# Cross-series reader staging validation\n\n' >> "$report"
          printf 'Commit before validation: `%s`\n\n' "$(git rev-parse HEAD)" >> "$report"

          run_check() {
            name="$1"
            shift
            log="$RUNNER_TEMP/${name}.log"
            "$@" >"$log" 2>&1
            code=$?
            printf '## %s\n\nExit code: `%s`\n\n```text\n' "$name" "$code" >> "$report"
            tail -n 180 "$log" >> "$report"
            printf '\n```\n\n' >> "$report"
            return 0
          }

          run_check spotlessApply ./gradlew spotlessApply
          run_check spotlessCheck ./gradlew spotlessCheck
          run_check testDebugUnitTest ./gradlew testDebugUnitTest
          run_check verifySqlDelightMigration ./gradlew verifySqlDelightMigration
          run_check assemblePreview ./gradlew assemblePreview
          run_check gitDiffCheck git diff --check

          cp "$report" STAGING_VALIDATION.md
          rm -f .github/workflows/agent-staging-validation.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record cross-series reader staging validation" || true
          git push origin HEAD:agent/cross-series-reader-navigation-staging
          exit 0
