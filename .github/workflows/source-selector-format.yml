name: Source Selector Diagnostic

on:
  pull_request:
    paths:
      - 'app/src/main/java/eu/kanade/domain/base/BasePreferences.kt'
      - 'app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/**'
      - 'app/src/test/java/eu/kanade/tachiyomi/ui/readinglist/**'
      - '.github/workflows/source-selector-format.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Check formatting
        run: ./gradlew spotlessCheck --console=plain

      - name: Capture unit-test output
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p diagnostic
          ./gradlew testDebugUnitTest --stacktrace --console=plain 2>&1 | tee diagnostic/test.log

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-selector-test-log-${{ github.sha }}
          path: diagnostic/test.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail when tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
