name: Reading List Formatting Diagnostic

on:
  pull_request:
    paths:
      - 'app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/**'
      - 'app/src/main/java/eu/kanade/tachiyomi/ui/home/HomeScreen.kt'
      - 'app/src/main/java/eu/kanade/tachiyomi/ui/updates/UpdatesTab.kt'
      - 'app/src/main/java/eu/kanade/tachiyomi/ui/history/HistoryTab.kt'
      - 'app/src/main/java/eu/kanade/tachiyomi/ui/browse/BrowseTab.kt'
      - 'app/src/main/java/eu/kanade/tachiyomi/ui/more/MoreTab.kt'
      - 'data/src/main/java/tachiyomi/data/readinglist/**'
      - 'domain/src/main/java/tachiyomi/domain/readinglist/**'
      - '.github/workflows/spotless-reading-list.yml'

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Apply Spotless formatting
        run: ./gradlew spotlessApply --console=plain

      - name: Capture formatted files
        run: |
          mkdir -p formatted
          git diff --binary > formatted/spotless.patch
          cp --parents \
            app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/*.kt \
            app/src/main/java/eu/kanade/tachiyomi/ui/home/HomeScreen.kt \
            app/src/main/java/eu/kanade/tachiyomi/ui/updates/UpdatesTab.kt \
            app/src/main/java/eu/kanade/tachiyomi/ui/history/HistoryTab.kt \
            app/src/main/java/eu/kanade/tachiyomi/ui/browse/BrowseTab.kt \
            app/src/main/java/eu/kanade/tachiyomi/ui/more/MoreTab.kt \
            data/src/main/java/tachiyomi/data/readinglist/*.kt \
            data/src/test/java/tachiyomi/data/readinglist/*.kt \
            domain/src/main/java/tachiyomi/domain/readinglist/model/ReadingList.kt \
            domain/src/main/java/tachiyomi/domain/readinglist/repository/ReadingListRepository.kt \
            app/src/test/java/eu/kanade/tachiyomi/ui/readinglist/*.kt \
            formatted/

      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reading-list-spotless-${{ github.sha }}
          path: formatted
          if-no-files-found: error
          retention-days: 3
