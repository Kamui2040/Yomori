name: Agent staging navigation cleanup

on:
  push:
    branches:
      - agent/cross-series-reader-navigation-staging

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/cross-series-reader-navigation-staging
          fetch-depth: 0

      - name: Apply exact cleanup
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              actual = text.count(old)
              if actual != count:
                  raise RuntimeError(f"{path}: expected {count} occurrences, found {actual}: {old[:80]!r}")
              file.write_text(text.replace(old, new, count), encoding="utf-8")

          navigator = "app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListReaderNavigator.kt"
          replace(
              navigator,
              "package eu.kanade.tachiyomi.ui.readinglist\n\n",
              "package eu.kanade.tachiyomi.ui.readinglist\n\nimport app.cash.sqldelight.async.coroutines.awaitAsOneOrNull\n",
          )
          replace(
              navigator,
              "        val currentIndex = readingList.entries.indexOfFirst { entry -> entry.id == currentEntryId }",
              "        val orderedEntries = readingList.entries.sortedBy(ReadingListEntry::position)\n        val currentIndex = orderedEntries.indexOfFirst { entry -> entry.id == currentEntryId }",
          )
          replace(
              navigator,
              "        if (targetIndex >= readingList.entries.size) {",
              "        if (targetIndex >= orderedEntries.size) {",
          )
          replace(
              navigator,
              "        val blockedIndex = readingList.entries.indexOfFirst { entry -> entry.id == blockedEntryId }",
              "        val orderedEntries = readingList.entries.sortedBy(ReadingListEntry::position)\n        val blockedIndex = orderedEntries.indexOfFirst { entry -> entry.id == blockedEntryId }",
          )
          replace(
              navigator,
              "        if (targetIndex >= readingList.entries.size) {",
              "        if (targetIndex >= orderedEntries.size) {",
          )
          replace(navigator, ".executeAsOneOrNull()", ".awaitAsOneOrNull()", count=3)

          activity = "app/src/main/java/eu/kanade/tachiyomi/ui/reader/ReadingListReaderActivity.kt"
          replace(
              activity,
              "import eu.kanade.tachiyomi.ui.readinglist.ReadingListReaderBlockReason\n",
              "",
          )
          PY
          status=$?
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
          fi
          rm -f .github/workflows/agent-staging-navigation-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          if [ "$status" -eq 0 ]; then
            git commit -m "Harden reading-list navigation state handling"
          else
            git commit -m "Remove unsuccessful navigation cleanup helper"
          fi
          git push origin HEAD:agent/cross-series-reader-navigation-staging
          exit 0
