name: Agent staging compile fixes

on:
  push:
    branches:
      - agent/cross-series-reader-navigation-staging

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/cross-series-reader-navigation-staging
          fetch-depth: 0

      - name: Apply exact compile and robustness fixes
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              actual = text.count(old)
              if actual != count:
                  raise RuntimeError(f"{path}: expected {count} occurrences, found {actual}: {old[:100]!r}")
              file.write_text(text.replace(old, new, count), encoding="utf-8")

          repository = "data/src/main/java/tachiyomi/data/readinglist/ReadingListRepositoryImpl.kt"
          replace(repository, "readingList.requireValidPersistenceOrder()", "readingList.requireContiguousCblOrder()")
          replace(repository, "selectedSourceIds.requireValidSourceSelection()", "selectedSourceIds.requireDistinctSourceSelection()", count=2)
          replace(
              repository,
              "private fun CblReadingList.requireValidPersistenceOrder()",
              "private fun CblReadingList.requireContiguousCblOrder()",
          )
          replace(
              repository,
              "private fun List<Long>.requireValidSourceSelection()",
              "private fun List<Long>.requireDistinctSourceSelection()",
          )

          navigator = "app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListReaderNavigator.kt"
          replace(
              navigator,
              '''            is MaterializationResult.Ready -> {
                readingListRepository.clearEntryReaderFailure(entry.id)
                ReadingListReaderResult.Ready(''',
              '''            is MaterializationResult.Ready -> {
                ReadingListReaderResult.Ready(''',
          )
          replace(navigator, "fetchDetails = true,", "fetchDetails = false,")
          replace(
              navigator,
              '''        } catch (_: Exception) {
            return MaterializationResult.SourceFailure
        }''',
              '''        } catch (_: Throwable) {
            return MaterializationResult.SourceFailure
        }''',
          )
          PY
          status=$?
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
          fi

          rm -f .github/workflows/agent-staging-compile-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          if [ "$status" -eq 0 ]; then
            git commit -m "Resolve cross-series reader compile collisions"
          else
            git commit -m "Remove unsuccessful staging compile-fix helper"
          fi
          git push origin HEAD:agent/cross-series-reader-navigation-staging
          exit 0
