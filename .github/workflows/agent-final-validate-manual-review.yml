name: Agent final validate manual review

on:
  push:
    branches:
      - agent/manual-review-ui

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/manual-review-ui
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Validate implementation
        shell: bash
        run: |
          set +e
          : > "$RUNNER_TEMP/validation.log"

          run_check() {
            local name="$1"
            shift
            echo "===== $name =====" | tee -a "$RUNNER_TEMP/validation.log"
            "$@" >> "$RUNNER_TEMP/validation.log" 2>&1
            local status=$?
            echo "STATUS $name=$status" | tee -a "$RUNNER_TEMP/validation.log"
            return $status
          }

          spotless=0
          focused=0
          tests=0
          migrations=0
          assemble=0
          diffcheck=0

          run_check spotless ./gradlew spotlessCheck || spotless=$?
          run_check focused ./gradlew :app:testDebugUnitTest --tests eu.kanade.tachiyomi.ui.readinglist.ReadingListReviewScreenModelTest || focused=$?
          run_check tests ./gradlew testDebugUnitTest || tests=$?
          run_check migrations ./gradlew verifySqlDelightMigration || migrations=$?
          run_check assemble ./gradlew assemblePreview || assemble=$?
          run_check diffcheck git diff --check || diffcheck=$?

          {
            echo "validated_commit=$(git rev-parse HEAD)"
            echo "spotless=$spotless"
            echo "focused=$focused"
            echo "tests=$tests"
            echo "migrations=$migrations"
            echo "assemble=$assemble"
            echo "diffcheck=$diffcheck"
            echo
            tail -n 700 "$RUNNER_TEMP/validation.log"
          } > .github/agent-manual-review-validation.txt

      - name: Publish validation result and remove workflow
        run: |
          rm .github/workflows/agent-final-validate-manual-review.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/agent-manual-review-validation.txt \
                  .github/workflows/agent-final-validate-manual-review.yml
          git commit -m "Record final manual-review validation"
          git push origin HEAD:agent/manual-review-ui
