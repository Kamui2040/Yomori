name: Agent staging test fixture cleanup

on:
  push:
    branches:
      - agent/cross-series-reader-navigation-staging

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/cross-series-reader-navigation-staging
          fetch-depth: 0
      - shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          path = Path("app/src/test/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListReaderNavigatorTest.kt")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "import io.mockk.slot\n": "",
              "lastPageRead = 99)": "lastPageRead = 99L)",
              "        val mangaSlot = slot<List<Manga>>()\n        val chapterSlot = slot<List<Chapter>>()": "        val insertedMangas = mutableListOf<Manga>()\n        val insertedChapters = mutableListOf<Chapter>()",
              "                mangaSlot.captured = mangas\n                listOf(insertedManga)": "                insertedMangas += mangas\n                listOf(insertedManga)",
              "                chapterSlot.captured = chapters\n                listOf(insertedChapter)": "                insertedChapters += chapters\n                listOf(insertedChapter)",
              "        mangaSlot.captured.single().favorite shouldBe false\n        mangaSlot.captured.single().url shouldBe \"/series\"\n        chapterSlot.captured.map(Chapter::url).shouldContainExactly(\"/chapter/exact\")": "        insertedMangas.single().favorite shouldBe false\n        insertedMangas.single().url shouldBe \"/series\"\n        insertedChapters.map(Chapter::url).shouldContainExactly(\"/chapter/exact\")",
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise RuntimeError(f"Unexpected anchor count for {old[:60]!r}: {text.count(old)}")
              text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
          PY
          status=$?
          if [ "$status" -ne 0 ]; then git reset --hard HEAD; fi
          rm -f .github/workflows/agent-staging-test-fixture-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          if [ "$status" -eq 0 ]; then git commit -m "Clean reading-list navigator test fixtures"; else git commit -m "Remove unsuccessful test fixture helper"; fi
          git push origin HEAD:agent/cross-series-reader-navigation-staging
          exit 0
