# Authoritative CI and development APK artifact workflow for Yomori.
name: Yomori Build & Test

on:
  pull_request:
    paths:
      - '**'
      - '!**.md'
      - '!i18n/src/commonMain/moko-resources/**/strings.xml'
      - '!i18n/src/commonMain/moko-resources/**/plurals.xml'
      - 'i18n/src/commonMain/moko-resources/base/strings.xml'
      - 'i18n/src/commonMain/moko-resources/base/plurals.xml'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Test Yomori
    runs-on: 'ubuntu-24.04'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: agent/candidate-search-orchestration

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Apply reviewed candidate-search edge fixes
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "agent/candidate-search-orchestration"
          git merge-base --is-ancestor 85c5c23ac86c06862398b62af266000b2b721c8e HEAD
          git diff --quiet 85c5c23ac86c06862398b62af266000b2b721c8e -- \
            app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListCandidateSearch.kt \
            app/src/test/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListCandidateSearchTest.kt \
            domain/src/main/java/tachiyomi/domain/readinglist/matching/ReadingListChapterIssueExtractor.kt \
            domain/src/test/java/tachiyomi/domain/readinglist/matching/ReadingListChapterIssueExtractorTest.kt
          test -z "$(git status --porcelain)"

          cat .github/candidate-search-fix/compact-*.b64 | tr -d '\n' | base64 --decode > "$RUNNER_TEMP/apply-candidate-fixes.py"
          echo "aae8cf76fc0f74d37da2b799b1a499db632bcd345665714af3bc56815c31c0e9  $RUNNER_TEMP/apply-candidate-fixes.py" | sha256sum --check

          python3 - "$RUNNER_TEMP/apply-candidate-fixes.py" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text(encoding='utf-8')

          guard = '    if text.count(old) != 1:\n'
          if text.count(guard) != 1:
              raise SystemExit('Unable to isolate the intentionally repeated test fixture')
          text = text.replace(guard, '    if text.count(old) < 1:\n', 1)

          factory = '::mutableSetOf'
          if text.count(factory) != 2:
              raise SystemExit('Unexpected generated mutable-set factory count')
          text = text.replace(factory, '{ mutableSetOf() }')

          path.write_text(text, encoding='utf-8')
          PY

          python3 -m py_compile "$RUNNER_TEMP/apply-candidate-fixes.py"
          python3 "$RUNNER_TEMP/apply-candidate-fixes.py"

      - name: Apply code formatting
        run: ./gradlew spotlessApply

      - name: Check candidate-search patch scope
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          python3 - <<'PY'
          import subprocess

          expected = {
              'app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListCandidateSearch.kt',
              'app/src/test/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListCandidateSearchTest.kt',
              'domain/src/main/java/tachiyomi/domain/readinglist/matching/ReadingListChapterIssueExtractor.kt',
              'domain/src/test/java/tachiyomi/domain/readinglist/matching/ReadingListChapterIssueExtractorTest.kt',
          }
          changed = set(subprocess.check_output(['git', 'diff', '--name-only'], text=True).splitlines())
          untracked = set(subprocess.check_output(['git', 'ls-files', '--others', '--exclude-standard'], text=True).splitlines())
          if changed != expected or untracked:
              raise SystemExit(f'Unexpected scope: changed={sorted(changed)}, untracked={sorted(untracked)}')
          PY

      - name: Create public development signing key
        shell: bash
        run: |
          set -euo pipefail
          chmod +x .github/scripts/create-public-dev-keystore.sh
          .github/scripts/create-public-dev-keystore.sh "$RUNNER_TEMP/yomori-development.p12"

      - name: Check code format
        run: ./gradlew spotlessCheck

      - name: Run focused issue-extractor tests
        run: >-
          ./gradlew :domain:testDebugUnitTest
          --tests 'tachiyomi.domain.readinglist.matching.ReadingListChapterIssueExtractorTest'

      - name: Run focused candidate-search tests
        run: >-
          ./gradlew :app:testDebugUnitTest
          --tests 'eu.kanade.tachiyomi.ui.readinglist.ReadingListCandidateSearchTest'

      - name: Run unit tests
        id: unit_tests
        run: ./gradlew testDebugUnitTest

      - name: Verify SQLDelight migrations
        run: ./gradlew verifySqlDelightMigration

      - name: Upload test report
        if: failure() && steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-report-${{ github.sha }}
          path: app/build/reports/tests/testDebugUnitTest
          retention-days: 14

      - name: Build telemetry-free development APKs
        run: ./gradlew assemblePreview

      - name: Sign development APKs
        shell: bash
        run: |
          set -euo pipefail

          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          zipalign="$(find "$ANDROID_HOME/build-tools" -type f -name zipalign | sort -V | tail -n 1)"

          if [[ -z "$apksigner" || -z "$zipalign" ]]; then
            echo "::error::Unable to locate Android signing tools"
            exit 1
          fi

          shopt -s nullglob
          apks=(app/build/outputs/apk/preview/*.apk)
          if (( ${#apks[@]} == 0 )); then
            echo "::error::No preview APKs were generated"
            exit 1
          fi

          for apk in "${apks[@]}"; do
            stem="$(basename "${apk%.apk}")"
            unsigned_apk="$RUNNER_TEMP/${stem}-unsigned.apk"
            aligned_apk="$RUNNER_TEMP/${stem}-aligned.apk"
            signed_apk="$RUNNER_TEMP/${stem}-signed.apk"

            cp "$apk" "$unsigned_apk"

            # Remove inherited v1 signature files. Re-aligning also discards any
            # invalidated APK signing block before the stable test key is applied.
            zip -q -d "$unsigned_apk" \
              'META-INF/*.RSA' \
              'META-INF/*.DSA' \
              'META-INF/*.EC' \
              'META-INF/*.SF' \
              'META-INF/MANIFEST.MF' >/dev/null 2>&1 || true

            "$zipalign" -f -p 4 "$unsigned_apk" "$aligned_apk"

            "$apksigner" sign \
              --ks "$RUNNER_TEMP/yomori-development.p12" \
              --ks-type PKCS12 \
              --ks-key-alias yomori-development \
              --ks-pass pass:android \
              --key-pass pass:android \
              --out "$signed_apk" \
              "$aligned_apk"

            mv "$signed_apk" "$apk"
            rm -f "$apk.idsig" "$signed_apk.idsig" "$unsigned_apk" "$aligned_apk"
          done

      - name: Create versioned APK filenames
        shell: bash
        run: |
          set -euo pipefail

          base_version="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          output_dir="app/build/outputs/yomori"

          if [[ -z "$base_version" ]]; then
            echo "::error::Unable to determine Yomori version"
            exit 1
          fi

          mkdir -p "$output_dir"
          rm -f "$output_dir"/*.apk

          shopt -s nullglob
          apks=(app/build/outputs/apk/preview/*.apk)
          if (( ${#apks[@]} == 0 )); then
            echo "::error::No preview APKs were generated"
            exit 1
          fi

          for apk in "${apks[@]}"; do
            filename="$(basename "$apk")"
            case "$filename" in
              app-preview.apk)
                abi="universal"
                ;;
              app-*-preview.apk)
                abi="${filename#app-}"
                abi="${abi%-preview.apk}"
                ;;
              *)
                echo "::error::Unexpected APK filename: $filename"
                exit 1
                ;;
            esac

            destination="$output_dir/Yomori-v${base_version}-build${GITHUB_RUN_NUMBER}-${short_sha}-${abi}.apk"
            cp "$apk" "$destination"
            echo "Prepared $(basename "$destination")"
          done

          echo "YOMORI_ARTIFACT_NAME=Yomori-v${base_version}-build${GITHUB_RUN_NUMBER}-${short_sha}" >> "$GITHUB_ENV"

      - name: Verify development APK signature
        shell: bash
        run: |
          set -euo pipefail

          expected='08db929c3863a587963a3d72668622c9f464cbb3612cc2f4df29cdcb63750625'
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"

          if [[ -z "$apksigner" ]]; then
            echo "::error::Unable to locate apksigner"
            exit 1
          fi

          for apk in app/build/outputs/yomori/*.apk; do
            certificate_output="$("$apksigner" verify --verbose --print-certs "$apk")"
            normalized_output="$(
              printf '%s\n' "$certificate_output" |
                tr -d ':\r' |
                tr '[:upper:]' '[:lower:]'
            )"

            if ! grep -q "$expected" <<< "$normalized_output"; then
              printf '%s\n' "$certificate_output"
              echo "::error::Expected Yomori development certificate was not found in $(basename "$apk")"
              echo "Expected digest: $expected"
              exit 1
            fi
          done

      - name: Upload versioned APKs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.YOMORI_ARTIFACT_NAME }}
          path: app/build/outputs/yomori/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload mapping
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mapping-preview-${{ github.sha }}
          path: app/build/outputs/mapping
          if-no-files-found: error
          retention-days: 14

      - name: Inspect and publish validated edge-case fixes
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --stat
          git diff

          git fetch origin agent/candidate-search-orchestration
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/agent/candidate-search-orchestration)"

          git show 85c5c23ac86c06862398b62af266000b2b721c8e:.github/workflows/build.yml > .github/workflows/build.yml
          git rm -r .github/candidate-search-fix .github/workflows/apply-candidate-search-edge-fixes.yml
          git add \
            .github/workflows/build.yml \
            app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListCandidateSearch.kt \
            app/src/test/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListCandidateSearchTest.kt \
            domain/src/main/java/tachiyomi/domain/readinglist/matching/ReadingListChapterIssueExtractor.kt \
            domain/src/test/java/tachiyomi/domain/readinglist/matching/ReadingListChapterIssueExtractorTest.kt

          git diff --cached --check
          git status --short --branch
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Fix candidate search edge cases'
          git push origin HEAD:agent/candidate-search-orchestration
