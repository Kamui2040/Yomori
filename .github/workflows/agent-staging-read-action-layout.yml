name: Agent staging read action layout

on:
  push:
    branches:
      - agent/cross-series-reader-navigation-staging

permissions:
  contents: write

jobs:
  adjust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/cross-series-reader-navigation-staging
          fetch-depth: 0

      - name: Move read action to leading control
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path

          path = Path("app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListsTab.kt")
          text = path.read_text(encoding="utf-8")
          old_header = '''    ListItem(
        modifier = Modifier.clickable(enabled = !isSearching, onClick = onReview),
        headlineContent = {'''
          new_header = '''    ListItem(
        modifier = Modifier.clickable(enabled = !isSearching, onClick = onReview),
        leadingContent = {
            IconButton(
                onClick = onRead,
                enabled = !isSearching && !isPreparingReader,
            ) {
                Icon(
                    imageVector = Icons.Outlined.PlayArrow,
                    contentDescription = stringResource(
                        when {
                            readingList.completed -> R.string.reading_list_read_again
                            readingList.currentPosition != null -> R.string.reading_list_resume
                            else -> R.string.reading_list_read
                        },
                    ),
                )
            }
        },
        headlineContent = {'''
          old_trailing = '''                IconButton(
                    onClick = onRead,
                    enabled = !isSearching && !isPreparingReader,
                ) {
                    Icon(
                        imageVector = Icons.Outlined.PlayArrow,
                        contentDescription = stringResource(
                            when {
                                readingList.completed -> R.string.reading_list_read_again
                                readingList.currentPosition != null -> R.string.reading_list_resume
                                else -> R.string.reading_list_read
                            },
                        ),
                    )
                }
'''
          if text.count(old_header) != 1:
              raise RuntimeError(f"Header anchor count: {text.count(old_header)}")
          if text.count(old_trailing) != 1:
              raise RuntimeError(f"Trailing action anchor count: {text.count(old_trailing)}")
          text = text.replace(old_header, new_header)
          text = text.replace(old_trailing, "")
          path.write_text(text, encoding="utf-8")
          PY
          status=$?
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
          fi
          rm -f .github/workflows/agent-staging-read-action-layout.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          if [ "$status" -eq 0 ]; then
            git commit -m "Keep reading-list actions compact on phones"
          else
            git commit -m "Remove unsuccessful read-action layout helper"
          fi
          git push origin HEAD:agent/cross-series-reader-navigation-staging
          exit 0
