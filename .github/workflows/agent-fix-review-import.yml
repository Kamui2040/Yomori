name: Agent fix review import

on:
  push:
    branches:
      - agent/manual-review-ui

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/manual-review-ui
          fetch-depth: 0

      - name: Remove invalid Compose import
        run: |
          sed -i '/^import androidx\.compose\.foundation\.layout\.weight$/d' \
            app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListReviewScreen.kt

      - name: Commit correction
        run: |
          if git diff --quiet; then
            echo "Import already corrected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/eu/kanade/tachiyomi/ui/readinglist/ReadingListReviewScreen.kt
          git commit -m "Fix Compose row weight resolution"
          git push origin HEAD:agent/manual-review-ui
