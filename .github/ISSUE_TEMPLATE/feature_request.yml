name: Feature request
description: Propose a Yomori feature or improvement
title: "[Feature] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Yomori does not provide, bundle, recommend, preselect, install, or trust content sources.
        Requests for specific sources or extension repositories are out of scope.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the expected workflow and explicit user controls.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility, privacy, and store-readiness impact
      description: Note extension compatibility, network behavior, permissions, stored data, migration, F-Droid, or Accrescent implications.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This request does not ask Yomori to bundle, recommend, preselect, install, or maintain a content source.
          required: true
        - label: This request preserves user-controlled source scope and does not silently replace confirmed mappings.
          required: true
